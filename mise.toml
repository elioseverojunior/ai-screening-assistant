[settings]
experimental = true
color = true

[env]
ARCH = "{{exec(command='uname -m')}}"
IOS_PROJECT_NAME = "ios-screening-llm-assistant"
IOS_PROJECT_DIR = "apps/$IOS_PROJECT_NAME"
IOS_XCODEPROJ = "$IOS_PROJECT_DIR/$IOS_PROJECT_NAME.xcodeproj"
MACOS_PROJECT_NAME = "macos-screening-llm-assistant"
MACOS_PROJECT_DIR = "apps/$MACOS_PROJECT_NAME"
MACOS_XCODEPROJ = "$MACOS_PROJECT_DIR/$MACOS_PROJECT_NAME.xcodeproj"
PROJECT_NAME = "{{exec(command='basename $(git rev-parse --show-toplevel)')}}"
MACOS_DEVELOPER_DERIVE_DATA_DIR="~/Library/Developer/Xcode/DerivedData/$MACOS_PROJECT_NAME-*"

[tools]
uv = 'latest'

[hooks]
enter = { task = "setup" }

[tasks]
[tasks.envs]
description = "Display the most importan environment variables for the project"
run = '''
#!/usr/bin/env bash

set -eou pipefail

echo "Architecture:             $ARCH"
echo "iOS Project Name:         $IOS_PROJECT_NAME"
echo "iOS Project Directory:    $IOS_PROJECT_DIR"
echo "iOS Xcode Project:        $IOS_XCODEPROJ"
echo "macOS Project Name:       $MACOS_PROJECT_NAME"
echo "macOS Project Directory:  $MACOS_PROJECT_DIR"
echo "macOS Xcode Project:      $MACOS_XCODEPROJ"
echo "Project Name:             $PROJECT_NAME"
'''

[tasks.install-deps]
description = "Install Project Dependencies"
run = '''
#!/usr/bin/env bash

set -eou pipefail

echo "installing project '$PROJECT_NAME' dependencies for architecture '$ARCH'"
'''

[tasks.setup]
description = "Setup the project"
run = "echo 'setting up project'"
depends = ["install-deps"]

[tasks.compose-up]
description = "Start the full observability stack (OTel collector, Jaeger, Prometheus, Grafana)"
run = "docker compose -f development/docker-compose.yml up -d"

[tasks."compose-rebuild"]
description = "Start the full observability stack (OTel collector, Jaeger, Prometheus, Grafana)"
run = "docker compose -f development/docker-compose.yml up --build -d"

[tasks.compose-down]
description = "Stop the observability stack"
run = "docker compose -f development/docker-compose.yml down"

[tasks.compose-logs]
description = "Tail logs from all observability services"
run = "docker compose -f development/docker-compose.yml logs -f"

[tasks.compose-restart]
description = "Restart the observability stack"
run = "docker compose -f development/docker-compose.yml down && docker compose -f development/docker-compose.yml up -d"

[tasks.compose-status]
description = "Show status of all observability services"
run = "docker compose -f development/docker-compose.yml ps"

[tasks.grafana]
description = "Open Grafana in the default browser"
run = "open http://localhost:3000"

[tasks.jaeger]
description = "Open Jaeger UI in the default browser"
run = "open http://localhost:16686"

[tasks.prometheus]
description = "Open Prometheus in the default browser"
run = "open http://localhost:9090"

[tasks."build:macOS"]
usage = '''
flag "-c --configuration <configuration>" default="Debug" help="Build configuration" {
  choices "Debug" "Release"
}
'''
description = "Build the macOS app with xcodebuild"
run = "xcodebuild build -project $MACOS_XCODEPROJ -scheme $MACOS_PROJECT_NAME -destination 'platform=macOS' -configuration ${usage_configuration}"

[tasks."test:macOS"]
description = "Run unit tests"
run = "xcodebuild test -project $MACOS_XCODEPROJ -scheme $MACOS_PROJECT_NAME -destination 'platform=macOS' -configuration Debug"

[tasks."clean:macOS"]
description = "Clean build artifacts and derived data"
run = "rm -rf $MACOS_PROJECT_DIR/build $MACOS_DEVELOPER_DERIVE_DATA_DIR"

[tasks."lint:macOS"]
description = "Run SwiftLint"
run = "swiftlint lint --strict $MACOS_PROJECT_DIR/ 2>/dev/null; swiftlint lint --strict $MACOS_PROJECT_DIR/ 2>/dev/null || echo 'SwiftLint warnings found (non-blocking)'"

[tasks."format:macOS"]
description = "Run SwiftFormat"
run = "swiftformat $MACOS_PROJECT_DIR/ 2>/dev/null || true"

[tasks."sync:ai-server"]
description = "Sync AI server dependencies with uv"
run = "uv sync"
dir = "services/ai-server"

[tasks."test:ai-server"]
description = "Run AI server unit tests (excludes e2e)"
run = "uv run pytest tests/ -m 'not e2e' --cov=ai_server --cov-report=term-missing -x"
dir = "services/ai-server"

[tasks."test:ai-server-e2e"]
description = "Run AI server end-to-end tests"
run = "uv run pytest tests/e2e/ -v -x --no-cov"
dir = "services/ai-server"

[tasks."test:ai-server-all"]
description = "Run all AI server tests (unit + e2e)"
run = "uv run pytest -v --cov=ai_server --cov-report=term-missing -x"
dir = "services/ai-server"
