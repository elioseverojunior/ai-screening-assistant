[settings]
experimental = true
color = true

[env]
ARCH = "{{exec(command='uname -m')}}"
XCODE_CLIENTS_PROJECT_DIR = "apps/screening-assistant"
PROJECT_NAME = "{{exec(command='basename $(pwd)')}}"
MACOS_XCODEPROJ = "$XCODE_CLIENTS_PROJECT_DIR/screening-assistant.xcodeproj"
MACOS_XCWORKSPACE = "$XCODE_CLIENTS_PROJECT_DIR/screening-assistant.xcworkspace"
MACOS_DEVELOPER_DERIVE_DATA_DIR="~/Library/Developer/Xcode/DerivedData/screening-assistant-*"

[tools]
uv = "latest"

[hooks]
enter = { task = "setup" }

[tasks]
[tasks.envs]
description = "Display the most importan environment variables for the project"
run = '''
#!/usr/bin/env bash

set -eou pipefail

echo "Architecture:             $ARCH"
echo "macOS Xcode Project:      $MACOS_XCODEPROJ"
echo "macOS Workspace:          $MACOS_XCWORKSPACE"
echo "Project Name:             $PROJECT_NAME"
'''

[tasks.install-deps]
description = "Install Project Dependencies"
run = '''
#!/usr/bin/env bash

set -eou pipefail

echo "installing project '$PROJECT_NAME' dependencies for architecture '$ARCH'"
'''

[tasks.setup]
description = "Setup the project"
run = "echo 'setting up project'"
depends = ["install-deps"]

[tasks.compose-up]
description = "Start the full observability stack (OTel collector, Jaeger, Prometheus, Grafana)"
run = "docker compose -f development/docker-compose.yml up -d"

[tasks."compose-rebuild"]
description = "Start the full observability stack (OTel collector, Jaeger, Prometheus, Grafana)"
run = "docker compose -f development/docker-compose.yml up --build -d"

[tasks.compose-down]
description = "Stop the observability stack"
run = "docker compose -f development/docker-compose.yml down"

[tasks.compose-logs]
description = "Tail logs from all observability services"
run = "docker compose -f development/docker-compose.yml logs -f"

[tasks.compose-restart]
description = "Restart the observability stack"
run = "docker compose -f development/docker-compose.yml down && docker compose -f development/docker-compose.yml up -d"

[tasks.compose-status]
description = "Show status of all observability services"
run = "docker compose -f development/docker-compose.yml ps"

# XCode build tasks for macOS and iOS
[tasks."build:macOS"]
alias = ["build:macos", "build:osx", "osxb"]
usage = '''
flag "-c --configuration <configuration>" default="Debug" help="Build configuration" {
  choices "Debug" "Release"
}
'''
description = "Build the macOS app with xcodebuild"
run = "xcodebuild build -project $MACOS_XCODEPROJ -scheme \"screening-assistant\" -destination 'platform=macOS' -configuration ${usage_configuration}"

[tasks."release:macOS"]
alias = ["release:macos", "release:osx", "osxr"]
description = "Build the macOS app with xcodebuild"
depends = ["test:macOS"]
run = "mise run build:macOS  --configuration Release"

[tasks."test:macOS"]
description = "Run unit tests"
run = "xcodebuild test -project $MACOS_XCODEPROJ -scheme \"screening-assistant\" -destination 'platform=macOS' -configuration Debug -parallel-testing-enabled NO"

[tasks."test:macOS:workspace"]
description = "Run unit tests from workspace"
run = "xcodebuild test -workspace $MACOS_XCWORKSPACE -scheme \"screening-assistant\" -destination 'platform=macOS' -configuration Debug -parallel-testing-enabled NO"

[tasks."build:macOS:workspace"]
description = "Build the macOS app with xcodebuild from workspace"
run = "xcodebuild build -workspace $MACOS_XCWORKSPACE -scheme \"screening-assistant\" -destination 'platform=macOS' -configuration Debug"

[tasks."clean:macOS"]
description = "Clean build artifacts and derived data"
run = "rm -rf apps/screening-assistant/build $MACOS_DEVELOPER_DERIVE_DATA_DIR"

[tasks."lint:macOS"]
description = "Run SwiftLint"
run = "if which swiftlint >/dev/null 2>&1; then swiftlint lint --strict apps/screening-assistant/ 2>/dev/null || echo 'SwiftLint violations found (non-blocking)'; else echo 'SwiftLint not installed (non-blocking)'; fi"

[tasks."format:macOS"]
description = "Run SwiftFormat"
run = "swiftformat apps/screening-assistant/ 2>/dev/null || true"

[tasks."sync:ai-server"]
description = "Sync AI server dependencies with uv"
run = "uv sync"
dir = "services/ai-server"

[tasks."test:ai-server"]
description = "Run AI server unit tests (excludes e2e)"
run = "uv run pytest tests/ -m 'not e2e' --cov=ai_server --cov-report=term-missing -x"
dir = "services/ai-server"

[tasks."test:ai-server-e2e"]
description = "Run AI server end-to-end tests"
run = "uv run pytest tests/e2e/ -v -x --no-cov"
dir = "services/ai-server"

[tasks."test:ai-server-all"]
description = "Run all AI server tests (unit + e2e)"
run = "uv run pytest -v --cov=ai_server --cov-report=term-missing -x"
dir = "services/ai-server"

# Endpoints
[tasks.grafana]
description = "Open Grafana in the default browser"
run = "open http://localhost:3000"

[tasks.jaeger]
description = "Open Jaeger UI in the default browser"
run = "open http://localhost:16686"

[tasks.prometheus]
description = "Open Prometheus in the default browser"
run = "open http://localhost:9090"

[tasks."swagger"]
description = "Open AI Server Swagger UI in browser"
run = "open http://localhost:8000/docs"

# Utility tasks
[tasks."list:schemes:macOS"]
description = "List all macOS schemes"
run = "xcodebuild -list -project $MACOS_XCODEPROJ"

[tasks."list:destinations:macOS"]
description = "List macOS destinations"
run = "xcodebuild -scheme \"screening-assistant\" -showdestinations"

# Archive & Export tasks
[tasks."archive:macOS"]
description = "Archive the macOS app for distribution"
depends = ["release:macOS"]
run = "xcodebuild archive -project $MACOS_XCODEPROJ -scheme \"screening-assistant\" -destination 'platform=macOS' -archivePath build/screening-assistant.xcarchive -configuration Release"

[tasks."export:macOS"]
description = "Export the archived macOS app (requires ExportOptions.plist)"
depends = ["archive:macOS"]
run = "xcodebuild -exportArchive -archivePath build/screening-assistant.xcarchive -exportPath build/Export -exportOptionsPlist ExportOptions.plist"

[tasks."install:macOS"]
description = "Install the exported macOS app to /Applications"
depends = ["export:macOS"]
run = '''
#!/usr/bin/env bash
set -eou pipefail
APP_PATH="build/Export/Assistant.app"
if [ ! -d "$APP_PATH" ]; then
  echo "App not found at $APP_PATH. Run 'mise run archive:macOS && mise run export:macOS' first."
  exit 1
fi
echo "Installing to /Applications..."
sudo cp -R "$APP_PATH" /Applications/
echo "Installed successfully!"
'''
