global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: opentelemetry-collector
    scrape_interval: 10s
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: screening-otel-collector

  - job_name: ai-server
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ["ai-server:9000"]
        labels:
          service: screening-ai-server

  - job_name: cadvisor
    scrape_interval: 10s
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          service: screening-cadvisor
